{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card mt-4 mt-md-5">
            <div class="card-header bg-primary text-white">Check your email</div>
            <div class="card-body">
                <p>
                    If <strong>{{ email }}</strong> is registered with SpeakUp, we've
                    just sent a sign-in link to it. The link is valid for 24 hours.
                </p>
                <p class="text-muted small mb-0">
                    Didn't get it? Check your spam folder, or
                    <a href="{% url 'login' %}">try again</a>.
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
